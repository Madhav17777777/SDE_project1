services:
  postgres:
    image: postgres:15-alpine
    container_name: collab_editor_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: collab_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: collab_editor_redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: collab_editor_server
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/collab_editor
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_key_change_me_in_production
    depends_on:
      - postgres
      - redis

  client:
    build: ./client
    container_name: collab_editor_client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
